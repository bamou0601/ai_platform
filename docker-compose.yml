services:
  postgres:
    image: postgres:17
    container_name: ai-postgres
    restart: always

    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_platform

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: